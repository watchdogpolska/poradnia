name: Git Town

on:
  pull_request_target:
    branches:
      - '**'

jobs:
  git-town:
    name: Display the branch stack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: git-town/action@670e1f4feb81fdef4226fc09deefe09018eb20d1 # v1
        with:
          perennial-branches: |
            dev
