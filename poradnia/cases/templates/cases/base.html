{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans 'Cases' %} - {{ block.super }}{% endblock %}
{% block javascript %}
    {{ block.super }}
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const states = {
                show: { iconClass: 'fa-regular fa-square-plus', text: '{% trans "Show quote" %}' },
                hide: { iconClass: 'fa-regular fa-square-minus', text: '{% trans "Hide quote" %}' },
            };
            document.querySelectorAll('blockquote').forEach((el) => {
                el.hidden = true;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn quote-link';
                const icon = document.createElement('i');
                const label = document.createElement('span');
                btn.append(icon, ' ', label);
                const apply = ({ iconClass, text }) => {
                    icon.className = iconClass;
                    label.textContent = text;
                };
                apply(states.show);
                btn.addEventListener('click', (event) => {
                    event.preventDefault();
                    el.hidden = !el.hidden;
                    apply(el.hidden ? states.show : states.hide);
                });
                el.parentNode.insertBefore(btn, el);
            });
        });
    </script>
{% endblock %}
