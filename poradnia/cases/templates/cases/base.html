{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans 'Cases' %} - {{ block.super }}{% endblock %}
{% block javascript %}
    {{ block.super }}
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            var show = '<i class="fa-regular fa-square-plus"></i> {%trans "Show quote" %}';
            var hide = '<i class="fa-regular fa-square-minus"></i> {%trans "Hide quote" %}';
            document.querySelectorAll('blockquote').forEach(function (el) {
                el.hidden = true;
                var btn = document.createElement('button');
                btn.className = 'btn quote-link';
                btn.innerHTML = show;
                btn.addEventListener('click', function (event) {
                    event.preventDefault();
                    el.hidden = !el.hidden;
                    btn.innerHTML = el.hidden ? show : hide;
                });
                el.parentNode.insertBefore(btn, el);
            });
        });
    </script>
{% endblock %}
